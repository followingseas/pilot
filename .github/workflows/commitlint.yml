name: commitlint
on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # PR의 모든 커밋 메시지를 conventional commits 규칙으로 검사한다 (commitlint.config.mjs 사용)
      - uses: wagoid/commitlint-github-action@v6
