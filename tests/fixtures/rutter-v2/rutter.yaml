name: acme-core
version: 2.0.0
scope: organization
type: application

docs:
  conventions: docs/conventions
  maps: docs/maps
policies: policies
defaults: defaults.yaml

repositories:
  - id: payment-api
    remote: https://github.com/acme/payment-api

values:
  merge:
    overrides:
      - path: /policies/rules
        strategy: uniqueBy:id
  lockedFields:
    - /security/signing/required

adapters:
  claude:
    enabled: true
  codex:
    enabled: true
  copilot:
    enabled: true

priority: 0
